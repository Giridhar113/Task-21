<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <title>News & Events</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #efefef;
            padding: 60px;
        }

        /* MAIN LAYOUT */

        .container {
            display: flex;
            gap: 60px;
        }

        /* LEFT SIDE */

        .left {
            width: 25%;
        }

        .left h1 {
            font-size: 36px;
            margin-bottom: 20px;
            line-height: 1.2;
        }

        .left a {
            text-decoration: none;
            color: black;
            font-size: 14px;
            letter-spacing: 1px;
        }

        .left i {
            margin-left: 5px;
        }

        /* RIGHT SIDE */

        .right {
            display: flex;
            gap: 30px;
            width: 75%;
        }

        /* CARD */

        .card {
            width: 100%;
        }

        .card img {
            width: 100%;
            height: 230px;
            object-fit: cover;
            margin-bottom: 15px;
        }

        .card h4 {
            font-size: 12px;
            color: gray;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .card h2 {
            font-size: 20px;
            line-height: 1.4;
        }
    </style>

</head>

<body>

    <div class="container">

        <div class="left">
            <h1>Recent news<br>and events</h1>
            <a href="https://news.google.com/home?hl=en-IN&gl=IN&ceid=IN:en">VIEW MORE <i class="fa-solid fa-arrow-right"></i></a>
        </div>

        <div class="right">

            <div class="card">
                <img src="Pic1.jpeg">
                <h4>INTERVIEW</h4>
                <h2>Always applying higher standards</h2>
            </div>

            <div class="card">
                <img src="Pic2.jpeg">
                <h4>INTERVIEW</h4>
                <h2>Ecological materials and performances</h2>
            </div>

            <div class="card">
                <img src="Pic3.jpeg">
                <h4>INTERVIEW</h4>
                <h2>Cultural artifacts and new attitudes</h2>
            </div>

        </div>

    </div>

</body>

</html>
